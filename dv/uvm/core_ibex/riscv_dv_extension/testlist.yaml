  seed: 104
  make_cmd: "make SIMULATOR=vcs ISS=spike IBEX_CONFIG=opentitan TEST=cfg_04_arith_opentitan_nobranch SEED=104 ITERATIONS=1 COV=1"
  gen_opts: >
    +instr_cnt=2000
    +num_of_sub_program=0
    +no_fence=1
    +no_data_page=1
    +no_branch_jump=1
    +no_csr_instr=1
    +boot_mode=m
    +no_directed_instr=1
  iterations: 1
  no_iss: 1
  no_post_compare: 1
  gen_test: riscv_instr_base_test
  rtl_test: core_ibex_base_test


