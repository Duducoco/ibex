# ================================================================================
# Branch Coverage Dataset Collection — Test Configurations
# ================================================================================
#
# Purpose: Collect branch coverage reports spanning a wide coverage range for
#          ML-based branch coverage prediction model training/evaluation.
#
# Design axes varied across 28 configurations:
#   1. ibex_config    : small | opentitan | maxperf | maxperf-pmp-bmfull
#   2. test_type      : arithmetic / rand / loop / jump / mmu / irq / debug / mem_error
#   3. gen_opts       : instr_cnt, num_of_sub_program, illegal_instr_ratio,
#                       no_branch_jump, boot_mode, randomize_csr, B-ext, streams
#   4. sim_opts       : enable_irq_*_seq, enable_nested_irq, enable_debug_seq
#
# Coverage Tiers (expected branch coverage):
#   Tier 1 – Very Low  : ~10-25%   (cfg_01 – cfg_04)
#   Tier 2 – Low       : ~25-40%   (cfg_05 – cfg_09)
#   Tier 3 – Med-Low   : ~40-55%   (cfg_10 – cfg_14)
#   Tier 4 – Medium    : ~55-65%   (cfg_15 – cfg_18)
#   Tier 5 – Med-High  : ~65-75%   (cfg_19 – cfg_22)
#   Tier 6 – High      : ~75-85%   (cfg_23 – cfg_25)
#   Tier 7 – Very High : ~85-90%   (cfg_26 – cfg_28)
#
# Usage:
#   Use run_coverage_dataset.py to batch-run all configs:
#     cd /data/bwq_main/projects/ibex/dv/uvm/core_ibex
#     python3 scripts/run_coverage_dataset.py [--dry-run] [--tier <1-7>]
#
#   Or run a single config manually (this file must be active testlist.yaml):
#     make SIMULATOR=vcs ISS=spike IBEX_CONFIG=<ibex_config> \
#          TEST=<cfg_id> SEED=<seed> ITERATIONS=1 COV=1
#
# Notes:
#   - All configs use no_iss:1 (skip ISS co-simulation) for faster data collection.
#   - Seeds are fixed per tier to ensure reproducibility; vary seeds for more samples.
#   - 'ibex_config' and metadata fields (expected_branch_cov, diff_dims, make_cmd)
#     are non-standard fields ignored by the run system but documented here for use
#     by the batch runner script.
# ================================================================================


# ================================================================================
# TIER 1 — Very Low Branch Coverage (~10-25%)
# Key: no branches/jumps, minimal sub-programs, pure arithmetic paths only
# ================================================================================

- test: cfg_01_arith_small_nobranch
  description: >
    [Tier 1, ~10-20%] Pure arithmetic, small config, no branches or jumps.
    Baseline: only ALU paths activate, no control-flow branches.
  ibex_config: small
  expected_branch_cov: "10-20%"
  diff_dims: "hw=small(2-stage,no ICache/PMP/B), no_branch_jump=1, instr_cnt=1000, M-mode"
  seed: 101
  make_cmd: "make SIMULATOR=vcs ISS=spike IBEX_CONFIG=small TEST=cfg_01_arith_small_nobranch SEED=101 ITERATIONS=1 COV=1"
  gen_opts: >
    +instr_cnt=1000
    +num_of_sub_program=0
    +no_fence=1
    +no_data_page=1
    +no_branch_jump=1
    +no_csr_instr=1
    +boot_mode=m
    +no_directed_instr=1
  iterations: 1
  no_iss: 1
  no_post_compare: 1
  gen_test: riscv_instr_base_test
  rtl_test: core_ibex_base_test

- test: cfg_02_arith_maxperf_nocompressed
  description: >
    [Tier 1, ~12-22%] Pure arithmetic, maxperf config (3-stage pipeline /
    BranchTargetALU), no branches, no compressed instructions, 5k instructions.
  ibex_config: maxperf
  expected_branch_cov: "12-22%"
  diff_dims: "hw=maxperf(3-stage,BranchTargetALU), no_branch_jump=1, disable_compressed=1, instr_cnt=5000"
  seed: 102
  make_cmd: "make SIMULATOR=vcs ISS=spike IBEX_CONFIG=maxperf TEST=cfg_02_arith_maxperf_nocompressed SEED=102 ITERATIONS=1 COV=1"
  gen_opts: >
    +instr_cnt=5000
    +num_of_sub_program=0
    +no_fence=1
    +no_data_page=1
    +no_branch_jump=1
    +no_csr_instr=1
    +disable_compressed_instr=1
    +boot_mode=m
    +no_directed_instr=1
  iterations: 1
  no_iss: 1
  no_post_compare: 1
  gen_test: riscv_instr_base_test
  rtl_test: core_ibex_base_test

- test: cfg_03_rand_small_minimal
  description: >
    [Tier 1, ~15-25%] Random M-mode, small config, 1k instructions,
    no sub-programs, no CSR, no directed streams. Minimal random activation.
  ibex_config: small
  expected_branch_cov: "15-25%"
  diff_dims: "hw=small, rand_minimal, num_sub=0, no_csr=1, no_directed=1, instr_cnt=1000"
  seed: 103
  make_cmd: "make SIMULATOR=vcs ISS=spike IBEX_CONFIG=small TEST=cfg_03_rand_small_minimal SEED=103 ITERATIONS=1 COV=1"
  gen_opts: >
    +instr_cnt=1000
    +num_of_sub_program=0
    +no_csr_instr=1
    +no_directed_instr=1
    +no_fence=1
    +boot_mode=m
    +no_wfi=1
  iterations: 1
  no_iss: 1
  no_post_compare: 1
  gen_test: riscv_instr_base_test
  rtl_test: core_ibex_base_test

- test: cfg_04_arith_opentitan_nobranch
  description: >
    [Tier 1, ~12-20%] Pure arithmetic, opentitan config (ICache/ECC/Scramble/
    SecureIbex/PMP-16), no branches, 2k instructions. ICache paths barely active.
  ibex_config: opentitan
  expected_branch_cov: "12-20%"
